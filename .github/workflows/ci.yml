name: CI

on:
  push:
    branches: [ main, 'agents/*', 'merge-preview*' ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: [3.10, 3.11]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Linux)
        if: runner.os != 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff mypy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff mypy
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
        shell: pwsh

      - name: Lint (ruff)
        env:
          PYTHONPATH: src
        run: |
          ruff check src || true
        shell: bash

      - name: Type-check (mypy)
        env:
          PYTHONPATH: src
        run: |
          mypy src || true
        shell: bash

      - name: Run tests (Linux with coverage)
        if: runner.os != 'Windows'
        env:
          PYTHONPATH: src
        run: |
          python -m pytest --junitxml=pytest.xml --cov=src --cov-report=xml -q | tee test.log
        shell: bash

      - name: Run tests (Windows with coverage)
        if: runner.os == 'Windows'
        env:
          PYTHONPATH: src
        run: |
          python -m pytest --junitxml=pytest.xml --cov=src --cov-report=xml -q | Tee-Object -FilePath test.log
        shell: pwsh

      - name: Upload pytest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-artifacts
          path: |
            pytest.xml
            test.log
            coverage.xml

  docker-tests-linux:
    runs-on: ubuntu-latest
    needs: tests
    env:
      CREATE_PR: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
        shell: bash

      - name: Ensure Docker is available
        run: |
          docker --version
          docker info
        shell: bash

      - name: Run SandboxRunner docker test
        env:
          PYTHONPATH: src
        run: |
          python - <<PY
import json
from mammoth_os.sandbox_runner import run_code
# small project with a single test file
project = {'test_math.py': 'def test_dummy():\n    assert 1+1==2\n'}
# test script runs pytest on local files
test_script = "import pytest, sys; sys.exit(pytest.main(['-q']))"
res = run_code(code='', test_script=test_script, timeout=120, memory_limit_mb=256, project_files=project)
print(json.dumps(res))
# Persist the captured runtime stdout for debugging
with open('runtime_info.txt','w', encoding='utf-8') as _f:
    _f.write(res.get('stdout','') or '')
# Validate that the Docker path was used and tests passed
if res.get('method') != 'docker':
    print('Docker not used by sandbox_runner; got method:', res.get('method'))
    raise SystemExit(2)
if not res.get('passed'):
    raise SystemExit(1)
# Verify runtime info presence in stdout
out = res.get('stdout', '') or ''
if '---RUNTIME-INFO-START---' not in out or ('Seccomp' not in out and 'CapEff' not in out):
    print('Runtime info missing or seccomp/capability fields not present')
    raise SystemExit(3)
PY
        shell: bash

      - name: Upload runtime info artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-runtime-info
          path: runtime_info.txt

      - name: Run CI seccomp tuner
        if: always()
        run: |
          python .github/scripts/ci_seccomp_tuner.py --runtime runtime_info.txt --stderr runtime_error.txt --out diagnostics || true
        shell: bash

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seccomp-diagnostics
          path: diagnostics

      - name: Install gh CLI
        if: always() && env.CREATE_PR == 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y gh
        shell: bash

      - name: Attempt to create PR with suggested tweaks
        if: always() && env.CREATE_PR == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Authenticate gh (uses GITHUB_TOKEN provided by runner)
          echo $GITHUB_TOKEN | gh auth login --with-token || true
          python .github/scripts/apply_suggestion_and_create_pr.py || true
        shell: bash
